name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install poppler via conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: build
          python-version: '3.11'

      - name: Install poppler
        shell: pwsh
        run: |
          conda install -c conda-forge poppler -y
          $poppler = (Get-ChildItem "$env:CONDA_PREFIX\Library\bin" -Filter "pdftoppm.exe" -ErrorAction SilentlyContinue).DirectoryName
          if (-not $poppler) {
            $poppler = (Get-ChildItem "C:\Miniconda3" -Recurse -Filter "pdftoppm.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).DirectoryName
          }
          Write-Host "Poppler path: $poppler"
          echo "POPPLER_PATH=$poppler" >> $env:GITHUB_ENV

      - name: Install Python dependencies
        shell: pwsh
        run: pip install -r requirements.txt

      - name: Build EXE
        shell: pwsh
        run: |
          $poppler = $env:POPPLER_PATH
          Write-Host "Using poppler: $poppler"
          pyinstaller --onefile --windowed `
            --name PrinterSelector `
            --add-binary "${poppler}\*.dll;poppler/bin" `
            --add-binary "${poppler}\pdfinfo.exe;poppler/bin" `
            --add-binary "${poppler}\pdftoppm.exe;poppler/bin" `
            main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PrinterSelector-Windows
          path: dist\PrinterSelector.exe
