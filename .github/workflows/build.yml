name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install poppler via Chocolatey
        shell: pwsh
        run: choco install poppler -y

      - name: Find poppler path
        shell: pwsh
        run: |
          Get-ChildItem "C:\ProgramData\chocolatey\lib\poppler" -Recurse -Filter "pdftoppm.exe" | Select-Object FullName

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE
        shell: pwsh
        run: |
          $poppler = (Get-ChildItem "C:\ProgramData\chocolatey\lib\poppler" -Recurse -Filter "pdftoppm.exe").DirectoryName
          Write-Host "Poppler path: $poppler"
          pyinstaller --onefile --windowed `
            --name PrinterSelector `
            --add-binary "${poppler}\*.dll;poppler/bin" `
            --add-binary "${poppler}\pdfinfo.exe;poppler/bin" `
            --add-binary "${poppler}\pdftoppm.exe;poppler/bin" `
            main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PrinterSelector-Windows
          path: dist\PrinterSelector.exe
