name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download poppler
        shell: pwsh
        run: |
          curl -L https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0.zip -o poppler.zip
          Expand-Archive poppler.zip -DestinationPath poppler_dist

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed `
            --name PrinterSelector `
            --add-binary "poppler_dist\poppler-24.08.0\Library\bin\*.dll;poppler/bin" `
            --add-binary "poppler_dist\poppler-24.08.0\Library\bin\pdfinfo.exe;poppler/bin" `
            --add-binary "poppler_dist\poppler-24.08.0\Library\bin\pdftoppm.exe;poppler/bin" `
            main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PrinterSelector-Windows
          path: dist\PrinterSelector.exe
